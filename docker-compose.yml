services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: authkeyhub
      POSTGRES_PASSWORD: authkeyhub_secret
      POSTGRES_DB: authkeyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authkeyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector store для RAG) ──────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Переопределяем для Docker-сети (контейнер -> контейнер)
      DATABASE_URL: postgresql://authkeyhub:authkeyhub_secret@db:5432/authkeyhub
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
  qdrant_data:
