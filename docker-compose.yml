version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: authkeyhub
      POSTGRES_PASSWORD: authkeyhub_secret
      POSTGRES_DB: authkeyhub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authkeyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://authkeyhub:authkeyhub_secret@db:5432/authkeyhub
      SECRET_KEY: change-this-to-a-secure-random-key
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
