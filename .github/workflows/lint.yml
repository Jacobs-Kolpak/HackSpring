name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort pylint mypy
          pip install -r requirements.txt

      - name: flake8
        run: flake8 --config=config/setup.cfg main.py backend/

      - name: isort
        run: isort --settings-path=config/pyproject.toml --check-only main.py backend/

      - name: pylint
        run: pylint --rcfile=config/.pylintrc main.py backend/

      - name: mypy
        run: mypy --config-file=config/pyproject.toml main.py backend/