name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint mypy pytest httpx
          pip install -r requirements.txt

      - name: Ruff (lint + import sort)
        run: ruff check --config=config/pyproject.toml main.py backend/

      - name: Pylint
        run: pylint --rcfile=config/.pylintrc main.py backend/ || true

      - name: Mypy
        run: mypy --config-file=config/pyproject.toml main.py backend/ || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -c config/pyproject.toml -v
